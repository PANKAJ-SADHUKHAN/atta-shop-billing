<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color"
          content="#2d89ef">
    <link rel="manifest"
      href="/static/manifest.json">
<title>Atta Billing App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.app-header{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    text-align:center;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.app-header h1{
    margin:0;
    font-size:22px;
    font-weight:bold;
}

.app-header p{
    margin-top:6px;
    font-size:15px;
    opacity:.9;
}

h3{
    text-align:center;
}
.qty-label{
    font-size:18px;
    font-weight:bold;
    color:#374151;
}

.qty-input{
    width:100%;
    height:60px;
    font-size:30px;
    font-weight:bold;
    text-align:center;
    border:2px solid #d1d5db;
    border-radius:12px;
    outline:none;
    transition:.25s;
    background:#fafafa;
}

.qty-input:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.25);
    background:white;
}

.qty-input::placeholder{
    font-size:18px;
    font-weight:normal;
    color:#9ca3af;
}
label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.save-btn{
    background:#28a745;
    color:white;
}

.bill-btn{
    background:#007bff;
    color:white;
}

.print-btn{
    background:#ff9800;
    color:white;
}
.quick-buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.quick-buttons button{
    flex:1;
    height:55px;
    background:white;
    color:#374151;
    border:2px solid #d1d5db;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
    box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.quick-buttons button:hover{
    background:#eff6ff;
    border-color:#2563eb;
}
.quick-buttons button.active{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}
.receipt{
    padding:20px;
    min-height:220px;
    background:#ffffff;
    border:none;
}
.empty-preview{
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#9ca3af;
    font-size:18px;
    border:2px dashed #d1d5db;
    border-radius:12px;
}
.bill-print{
    text-align:center;
    line-height:1.1;
}
.bill-print h2{
    margin:0;
}

.bill-print p{
    margin:1px 0;
}
.grid-container {
  display: grid;
  grid-template-columns:35% 65%; /* Creates two equal columns */
  gap: 2px;                      /* Adds spacing between the divs */
}
.item-name{
    font-size:20px;
    margin-top:10px;
}
.shared-style {
  padding: 10px;
}

.qty-big{
    font-size:30px;
    margin-top:8px;
    margin-bottom:8px;
}
.clear-btn{
    background:#dc3545;
    color:white;
}

.clear-btn:hover{
    background:#c82333;
}
.preview-container{
    max-width:500px;
    margin:25px auto;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.preview-header{
    background:#f8fafc;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#374151;
    border-bottom:1px solid #e5e7eb;
}

.preview-container h3{
    text-align:center;
    margin-top:0;
    color:#333;
}
.receipt-line{
    border:none;
    border-top:1px dashed #9ca3af;
    margin:10px 0;
}
.button-row{
    display:flex;
    gap:12px;
    margin-top:20px;
}
.bill-btn{
    flex:1;
    height:58px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    box-shadow:0 5px 12px rgba(37,99,235,.30);
    transition:.2s;
}
.print-btn{
    flex:1;
    height:58px;
    background:linear-gradient(135deg,#16a34a,#15803d);
    color:white;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    box-shadow:0 5px 12px rgba(22,163,74,.30);
    transition:.2s;
}
.clear-btn{
    flex:1;
    height:58px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    box-shadow:0 5px 12px rgba(220,38,38,.30);
    transition:.2s;
}
.button-row button:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
}
.button-row button:active{
    transform:scale(.97);
}
.button-row button{
    flex:1;
    margin-top:0;
}

@media print{
    body *{
        visibility:hidden;
    }

    #receipt, #receipt *{
        visibility:visible;
    }

    #receipt{
        position:absolute;
        left:0;
        top:0;
        margin:0 auto;
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="app-header">

    <h1>🛒 Sadhukhan Enterprise</h1>

    <p>Atta Billing System</p>

</div>
<hr>

<label class="qty-label">Quantity (Kg)</label>
<input
    type="number"
    id="qty"
    step="0.1"
    inputmode="decimal"
    class="qty-input"
    placeholder="Enter quantity"
    oninput="clearQtyError();clearQuickSelection();">

<div class="quick-buttons">
<button onclick="setQty(1)">1 Kg</button>
<button onclick="setQty(2)">2 Kg</button>
<button onclick="setQty(5)">5 Kg</button>
<button onclick="setQty(10)">10 Kg</button>
</div>

<div class="button-row">

    <button class="bill-btn" onclick="generateBill()">
        📄 Generate
    </button>

    <button class="print-btn" onclick="window.print()">
        🖨 Print
    </button>

    <button class="clear-btn" onclick="clearBill()">
        🗑 Clear
    </button>

</div>
</div>
<div class="preview-container">

    <div class="preview-header">
        🧾 Bill Preview
    </div>

    <div id="receipt" class="receipt">

        <div class="empty-preview">
            No bill generated yet
        </div>

    </div>

</div>

<script src=/js/atta.js>
</script>

</body>
</html>
