<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atta Billing App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.save-btn{
    background:#28a745;
    color:white;
}

.bill-btn{
    background:#007bff;
    color:white;
}

.print-btn{
    background:#ff9800;
    color:white;
}

.quick-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.quick-buttons button{
    flex:1;
    background:#444;
    color:white;
}

.receipt{
    margin-top:20px;
    padding:15px;
    border:1px dashed #000;
    background:#fff;
    white-space:pre-line;
}

@media print{
    body *{
        visibility:hidden;
    }

    #receipt, #receipt *{
        visibility:visible;
    }

    #receipt{
        position:absolute;
        left:0;
        top:0;
        width:100%;
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>ATTA BILLING APP</h2>

<label>Shop Name</label>
<input type="text" id="shopName">

<label>Address</label>
<input type="text" id="address">

<label>Phone</label>
<input type="text" id="phone">

<label>Rate Per Kg (₹)</label>
<input type="number" id="rate">

<button class="save-btn" onclick="saveSettings()">Save Settings</button>

<hr>

<label>Quantity (Kg)</label>
<input type="number" id="qty" step="0.1" oninput="calculateAmount()">

<div class="quick-buttons">
<button onclick="setQty(1)">1 Kg</button>
<button onclick="setQty(2)">2 Kg</button>
<button onclick="setQty(5)">5 Kg</button>
<button onclick="setQty(10)">10 Kg</button>
</div>

<label>Amount (₹)</label>
<input type="text" id="amount" readonly>

<button class="bill-btn" onclick="generateBill()">Generate Bill</button>

<button class="print-btn" onclick="window.print()">Print Bill</button>

<div id="receipt" class="receipt"></div>

</div>

<script>

window.onload = function(){
    loadSettings();
};

function saveSettings(){

    localStorage.setItem("shopName",
        document.getElementById("shopName").value);

    localStorage.setItem("address",
        document.getElementById("address").value);

    localStorage.setItem("phone",
        document.getElementById("phone").value);

    localStorage.setItem("rate",
        document.getElementById("rate").value);

    alert("Settings Saved");
}

function loadSettings(){

    document.getElementById("shopName").value =
        localStorage.getItem("shopName") || "";

    document.getElementById("address").value =
        localStorage.getItem("address") || "";

    document.getElementById("phone").value =
        localStorage.getItem("phone") || "";

    document.getElementById("rate").value =
        localStorage.getItem("rate") || "";
}

function setQty(value){
    document.getElementById("qty").value = value;
    calculateAmount();
}

function calculateAmount(){

    let qty = parseFloat(
        document.getElementById("qty").value
    ) || 0;

    let rate = parseFloat(
        document.getElementById("rate").value
    ) || 0;

    let amount = qty * rate;

    document.getElementById("amount").value =
        amount.toFixed(2);
}

function generateBill(){

    let shopName =
        document.getElementById("shopName").value;

    let address =
        document.getElementById("address").value;

    let phone =
        document.getElementById("phone").value;

    let qty =
        document.getElementById("qty").value;

    let amount =
        document.getElementById("amount").value;

    let now = new Date();

    let receipt =
`================================
${shopName}
${address}
Phone: ${phone}
================================

Date: ${now.toLocaleString()}

Item           Qty        Amount

Atta           ${qty} Kg      ₹${amount}

--------------------------------
Total                     ₹${amount}
--------------------------------

Thank You
Visit Again

================================`;

    document.getElementById("receipt").innerText =
        receipt;
        saveBillToServer();
}
async function saveBillToServer() {

    console.log("Saving bill...");

    const qty = document.getElementById("qty").value;

    const rate = document.getElementById("rate").value;

    const amount = document.getElementById("amount").value;

    const response = await fetch("/api/bill", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            quantity: qty,
            rate: rate,
            amount: amount
        })
    });

    const result = await response.json();

    console.log(result);
}

</script>

</body>
</html>
