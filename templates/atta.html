<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color"
          content="#2d89ef">
    <link rel="manifest"
      href="/static/manifest.json">
<title>Atta Billing App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
          .app-header{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    color:white;

    text-align:center;

    padding:20px;

    border-radius:12px;

    margin-bottom:20px;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

}

.app-header h1{

    margin:0;

    font-size:28px;

    font-weight:bold;

}

.app-header p{

    margin-top:6px;

    font-size:15px;

    opacity:.9;

}

h3{
    text-align:center;
}
.qty-label{

    font-size:18px;

    font-weight:bold;

    color:#374151;

}

.qty-input{

    width:100%;

    height:60px;

    font-size:30px;

    font-weight:bold;

    text-align:center;

    border:2px solid #d1d5db;

    border-radius:12px;

    outline:none;

    transition:.25s;

    background:#fafafa;

}

.qty-input:focus{

    border-color:#2563eb;

    box-shadow:0 0 10px rgba(37,99,235,.25);

    background:white;

}

.qty-input::placeholder{

    font-size:18px;

    font-weight:normal;

    color:#9ca3af;

}
label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.save-btn{
    background:#28a745;
    color:white;
}

.bill-btn{
    background:#007bff;
    color:white;
}

.print-btn{
    background:#ff9800;
    color:white;
}

.quick-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.quick-buttons button{
    flex:1;
    background:#444;
    color:white;
}

.receipt{
    margin-top:15px;
    padding:15px;
    border:1px dashed #000;
    background:#fff;
    white-space:pre-line;
}
.bill-print{
    text-align:center;
    line-height:1.1;
}
.bill-print h2{
    margin:0;
}

.bill-print p{
    margin:1px 0;
}
.grid-container {
  display: grid;
  grid-template-columns:35% 65%; /* Creates two equal columns */
  gap: 2px;                      /* Adds spacing between the divs */
}
.item-name{
    font-size:20px;
    margin-top:10px;
}
.shared-style {
  padding: 10px;
}

.qty-big{
    font-size:30px;
    margin-top:8px;
    margin-bottom:8px;
}
.clear-btn{
    background:#dc3545;
    color:white;
}

.clear-btn:hover{
    background:#c82333;
}
          .preview-container{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview-container h3{
    text-align:center;
    margin-top:0;
    color:#333;
}
          .button-row{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.button-row button{
    flex:1;
    margin-top:0;
}

@media print{
    body *{
        visibility:hidden;
    }

    #receipt, #receipt *{
        visibility:visible;
    }

    #receipt{
        position:absolute;
        left:0;
        top:0;
        margin:0 auto;
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="app-header">

    <h1>🛒 Sadhukhan Enterprise</h1>

    <p>Atta Billing System</p>

</div>
<hr>

<label class="qty-label">Quantity (Kg)</label>
<input
    type="number"
    id="qty"
    step="0.1"
    inputmode="decimal"
    class="qty-input"
    placeholder="Enter quantity">

<div class="quick-buttons">
<button onclick="setQty(1)">1 Kg</button>
<button onclick="setQty(2)">2 Kg</button>
<button onclick="setQty(5)">5 Kg</button>
<button onclick="setQty(10)">10 Kg</button>
</div>

<div class="button-row">

    <button class="bill-btn" onclick="generateBill()">
        Generate Bill
    </button>

    <button class="print-btn" onclick="window.print()">
        Print Bill
    </button>

    <button class="clear-btn" onclick="clearBill()">
        Clear Bill
    </button>

</div>
</div>
<div class="preview-container">

    <h3>Bill Preview</h3>

    <div id="receipt" class="receipt"></div>

</div>

<script>

    if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("/static/sw.js")

    .then(() => {

        console.log("Service Worker Registered");

    });

}

    const SHOP_NAME = "Sadhukhan Enterprise";

    const SHOP_ADDRESS =
    "45 RNT Path, Titagarh, Laxmighat";

    const SHOP_PHONE =
    "9830747515";
    const DEVICE_TOKEN =
    "ATTA_SHOP_2026_SECRET";


function setQty(value){
    document.getElementById("qty").value = value;
}

function formatBillId(id){

    return String(id).padStart(4, "0");

}

function formatQuantity(qty){

    qty = parseFloat(qty);

    const kg = Math.floor(qty);

    const grams = Math.round(
        (qty - kg) * 1000
    );

    if(grams === 0){
        return `${kg} KG`;
    }

    if(kg === 0){
        return `${grams} G`;
    }

    return `${kg} . ${grams} G`;
}


async function generateBill(){

    let shopName = SHOP_NAME;

    let address = SHOP_ADDRESS;

    let phone = SHOP_PHONE;
    const billId = await saveBillToServer();
    let qty = document.getElementById("qty").value;
    if(qty === ""){

        alert("Please enter the quantity.");

        document.getElementById("qty").focus();

        return;
    }

    let now = new Date();
    const dateTime = now.toLocaleString("en-IN", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
});
    

    document.getElementById("receipt").innerHTML = `
    <div class="bill-print">
        <p><b>Bill No:</b> ${formatBillId(billId)}</p>
        <h3>${shopName}</h3>
        <p>${address}</p>
        <p>Phone: ${phone}</p>
        <hr>
        <p>Date: ${dateTime}</p>
        <hr>
        <div class="grid-container">
        <div class="item-name shared-style">ATTA</div>
        <div class="qty-big shared-style">${formatQuantity(qty)}</div>
        </div>
        <hr>
        <p>Thank You</p>

    </div>
`;
}
function clearBill(){

    document.getElementById("receipt").innerHTML = "";

    document.getElementById("qty").value = "";

    document.getElementById("qty").focus();

}
async function saveBillToServer() {

    console.log("Saving bill...");

    const qty = document.getElementById("qty").value;

    const response = await fetch("/api/bill", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            quantity: qty,
            device_token: DEVICE_TOKEN
        })
    });

    const result = await response.json();

    console.log(result);
    return result.bill_id;
}
</script>

</body>
</html>
