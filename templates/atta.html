<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color"
          content="#2d89ef">
    <link rel="manifest"
      href="/static/manifest.json">
<title>Atta Billing App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.save-btn{
    background:#28a745;
    color:white;
}

.bill-btn{
    background:#007bff;
    color:white;
}

.print-btn{
    background:#ff9800;
    color:white;
}

.quick-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.quick-buttons button{
    flex:1;
    background:#444;
    color:white;
}

.receipt{
    margin-top:15px;
    padding:15px;
    border:1px dashed #000;
    background:#fff;
    white-space:pre-line;
}
.bill-print{
    text-align:center;
    line-height:1.1;
}
.bill-print h2{
    margin:0;
}

.bill-print p{
    margin:1px 0;
}
.grid-container {
  display: grid;
  grid-template-columns: 1fr 1fr; /* Creates two equal columns */
  gap: 15px;                      /* Adds spacing between the divs */
}
.item-name{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}
.shared-style {
  padding: 20px;
}

.qty-big{
    font-size:30px;
    font-weight:bold;
    margin-top:8px;
    margin-bottom:8px;
}

@media print{
    body *{
        visibility:hidden;
    }

    #receipt, #receipt *{
        visibility:visible;
    }

    #receipt{
        position:absolute;
        left:0;
        top:0;
        width:100%;
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>ATTA BILLING APP</h2>
<hr>

<label>Quantity (Kg)</label>
<input type="number" id="qty" step="0.1">

<div class="quick-buttons">
<button onclick="setQty(1)">1 Kg</button>
<button onclick="setQty(2)">2 Kg</button>
<button onclick="setQty(5)">5 Kg</button>
<button onclick="setQty(10)">10 Kg</button>
</div>

<button class="bill-btn" onclick="generateBill()">Generate Bill</button>

<button class="print-btn" onclick="window.print()">Print Bill</button>

<div id="receipt" class="receipt"></div>

</div>

<script>

    if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("/static/sw.js")

    .then(() => {

        console.log("Service Worker Registered");

    });

}

    const SHOP_NAME = "Sadhukhan Enterprise";

    const SHOP_ADDRESS =
    "45 RNT Path, Titagarh, Laxmighat";

    const SHOP_PHONE =
    "9830747515";
    const DEVICE_TOKEN =
    "ATTA_SHOP_2026_SECRET";


function setQty(value){
    document.getElementById("qty").value = value;
}


function generateBill(){

    let shopName = SHOP_NAME;

    let address = SHOP_ADDRESS;

    let phone = SHOP_PHONE;
    let qty =
        document.getElementById("qty").value;

    let now = new Date();
    const dateTime = now.toLocaleString("en-IN", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
});

    document.getElementById("receipt").innerHTML = `
    <div class="bill-print">

        <h2>${shopName}</h2>
        <p>${address}</p>
        <p>Phone: ${phone}</p>
        <hr>
        <p>Date: ${dateTime}</p>
        <hr>
        <div class="grid-container">
        <div class="item-name shared-style">ATTA</div>
        <div class="qty-big shared-style">${qty} KG</div>
        </div>
        <hr>
        <p>Thank You</p>

    </div>
`;
        saveBillToServer();
}
async function saveBillToServer() {

    console.log("Saving bill...");

    const qty = document.getElementById("qty").value;

    const response = await fetch("/api/bill", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            quantity: qty,
            device_token: DEVICE_TOKEN
        })
    });

    const result = await response.json();

    console.log(result);
}

</script>

</body>
</html>
