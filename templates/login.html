<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <meta name="theme-color"
          content="#2d89ef">
    <link rel="manifest"
      href="/static/manifest.json">
    <title>Sadhukhan Enterprise</title>

    <style>

```css
*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial,Helvetica,sans-serif;

}

body{

    background:#f3f7fb;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.login-container{

    width:100%;

    display:flex;

    justify-content:center;

}

.login-card{

    width:100%;

    max-width:420px;

    background:white;

    border-radius:24px;

    padding:35px;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

    animation:fadeUp .6s ease;

}

.logo-circle{

    width:90px;

    height:90px;

    margin:auto;

    border-radius:50%;

    background:linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    font-size:40px;

    margin-bottom:20px;

}

.login-card h1{

    text-align:center;

    font-size:30px;

    color:#1f2937;

}

.subtitle{

    text-align:center;

    color:#6b7280;

    margin-top:8px;

    margin-bottom:30px;

    font-size:16px;

}

.login-card h2{

    text-align:center;

    color:#374151;

    margin-bottom:25px;

    font-size:22px;

}

.input-group{

    position:relative;

    margin-bottom:30px;

}

.input-group input{

    width:100%;

    height:58px;

    padding:20px 15px 8px;

    border:2px solid #d1d5db;

    border-radius:14px;

    font-size:17px;

    outline:none;

    transition:.25s;

    background:white;

}

.input-group input:focus{

    border-color:#2563eb;

}

.input-group label{

    position:absolute;

    left:15px;

    top:18px;

    color:#6b7280;

    background:white;

    padding:0 5px;

    transition:.2s;

    pointer-events:none;

}

.input-group input:focus+label,

.input-group input:not(:placeholder-shown)+label{

    top:-10px;

    left:12px;

    font-size:13px;

    color:#2563eb;

}

.login-btn{

    width:100%;

    height:58px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 8px 18px rgba(37,99,235,.30);
}

.login-btn:hover{
    transform:translateY(-2px);
}

.login-btn:active{
    transform:scale(.98);
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#6b7280;
}

.footer small{
    display:block;
    margin-top:6px;
}
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:400px){
    .login-card{
        padding:25px;
    }
    .login-card h1{
        font-size:26px;
    }
}

@media(min-width:768px){
    .login-card{
        max-width:480px;
        padding:45px;
    }
    .login-card h1{
        font-size:36px;
    }
}

    </style>
</head>
<body>
<div class="login-container">

    <div class="login-card">

        <div class="logo-circle">
            🛒
        </div>

        <h1>Sadhukhan Enterprise</h1>

        <p class="subtitle">Atta Billing System</p>

        <h2>Administrator Login</h2>

        <form method="POST">

            <div class="input-group">

                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder=" "
                    required
                >

                <label for="password">🔒 Password</label>

            </div>

            <button type="submit" class="login-btn">

                Login →

            </button>

        </form>

        <div class="footer">

            <p>Secure Billing Application</p>

            <small>Version 1.0</small>

        </div>

    </div>

</div>
<script>
    if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("/static/sw.js")

    .then(() => {

        console.log("Service Worker Registered");

    });

}
</script>
</body>

</html>
