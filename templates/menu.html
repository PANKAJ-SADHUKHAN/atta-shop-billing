<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <meta name="theme-color"
          content="#2d89ef">
    <link rel="manifest"
      href="/static/manifest.json">
    <title>Atta Shop System</title>

    <style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial,Helvetica,sans-serif;

}

body{

    background:#f3f7fb;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

.container{

    width:92%;

    max-width:420px;

    background:white;

    border-radius:24px;

    padding:30px;

    box-shadow:0 12px 35px rgba(0,0,0,.08);

}

.logo{

    text-align:center;

    margin-bottom:35px;

}

.logo-circle{

    width:80px;

    height:80px;

    margin:auto;

    border-radius:50%;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:38px;

    margin-bottom:18px;

}

.logo h1{

    font-size:30px;

    color:#1f2937;

    margin-bottom:8px;

}

.logo p{

    color:#6b7280;

    font-size:16px;

}

.menu-btn{

    text-decoration:none;

    color:white;

    display:flex;

    align-items:center;

    gap:18px;

    padding:18px;

    border-radius:18px;

    margin-bottom:18px;

    transition:.25s;

}

.menu-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.icon{

    width:55px;

    height:55px;

    border-radius:14px;

    background:rgba(255,255,255,.2);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:28px;

}

.text{

    display:flex;

    flex-direction:column;

}

.text span{

    font-size:22px;

    font-weight:bold;

}

.text small{

    font-size:14px;

    opacity:.9;

}

.billing{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

}

.dashboard{

    background:linear-gradient(135deg,#0ea5e9,#0284c7);

}

.logout{

    background:linear-gradient(135deg,#ef4444,#dc2626);

}
@media (min-width:768px){

    .container{

        max-width:500px;

        padding:40px;

    }

    .logo h1{

        font-size:36px;

    }

    .logo p{

        font-size:18px;

    }

    .menu-btn{

        padding:22px;

    }

    .text span{

        font-size:24px;

    }

    .text small{

        font-size:16px;

    }

    .icon{

        width:60px;

        height:60px;

        font-size:30px;

    }

}

    </style>
</head>
<body>

<div class="container">

    <div class="logo">

        <div class="logo-circle">
            🛒
        </div>

        <h1>Sadhukhan Enterprise</h1>

        <p>Atta Billing System</p>

    </div>

    <a href="/billing" class="menu-btn billing">

        <div class="icon">🧾</div>

        <div class="text">
            <span>Billing Page</span>
            <small>Create & Print Bills</small>
        </div>

    </a>

    <a href="/dashboard" class="menu-btn dashboard">

        <div class="icon">📊</div>

        <div class="text">
            <span>Dashboard</span>
            <small>Today's Billing Records</small>
        </div>

    </a>

    <a href="/logout" class="menu-btn logout">

        <div class="icon">🚪</div>

        <div class="text">
            <span>Logout</span>
            <small>Exit Securely</small>
        </div>

    </a>

</div>
<script>
    if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("/static/sw.js")

    .then(() => {

        console.log("Service Worker Registered");

    });

}
</script>
</body>
</html>
